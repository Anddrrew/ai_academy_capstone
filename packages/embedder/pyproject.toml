[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-academy-embedder"
version = "0.1.0"
description = "Embedder service"
requires-python = "==3.11.14"
dependencies = [
  "ai-academy-shared-config",
  "fastapi[standard]",
  "langchain-huggingface",
  "pydantic-settings",
  "rich",
  "sentence-transformers",
]

[tool.uv.sources]
"ai-academy-shared-config" = { workspace = true }

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = ["main"]
