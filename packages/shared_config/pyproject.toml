[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-academy-shared-config"
version = "0.1.0"
description = "Shared config package"
requires-python = "==3.11.14"
dependencies = ["pydantic-settings"]

[tool.setuptools]
packages = ["shared_config"]
package-dir = { "shared_config" = "." }
