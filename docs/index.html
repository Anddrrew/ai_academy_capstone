<!doctype html>
<html>
  <body>
    <div class="mermaid"></div>
    <script type="module">
      const response = await fetch("architecture.mmd");
      const diagram = await response.text();
      document.querySelector(".mermaid").textContent = diagram;

      const { default: mermaid } =
        await import("https://cdn.jsdelivr.net/npm/mermaid@11.12.0/dist/mermaid.esm.min.mjs");
      const elkLayouts =
        await import("https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0.2.0/dist/mermaid-layout-elk.esm.min.mjs");

      mermaid.registerLayoutLoaders(elkLayouts.default);
      mermaid.initialize({ startOnLoad: false });
      await mermaid.run();
    </script>
  </body>
</html>
