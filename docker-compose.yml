services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 5s
      timeout: 3s
      retries: 10

  chatbot:
    build:
      context: ./packages/chatbot
      dockerfile: Dockerfile
    env_file:
      - .env
    command: >
      sh -lc "(npx @ai-sdk/devtools >/workspace_logs/devtools.log 2>&1 || true) &
      npm run dev -- --hostname 0.0.0.0 --port 3000 2>&1 | tee /workspace_logs/chatbot.log"
    ports:
      - "3001:3000"
      - "4983:4983"
    volumes:
      - ./packages/chatbot:/app
      - ./logs:/workspace_logs
      - /app/node_modules
      - /app/.next
    environment:
      OPENAI_API_KEY: ${OPENAI__API_KEY}
      KNOWLEDGE_BASE_MCP_URL: http://host.docker.internal:3002/mcp/sse
      QDRANT_URL: http://qdrant:6333
      EMBEDDER_URL: http://host.docker.internal:3003/embed
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING__VECTOR_SIZE}
      GITHUB_TOKEN: ${GITHUB__TOKEN}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant:
